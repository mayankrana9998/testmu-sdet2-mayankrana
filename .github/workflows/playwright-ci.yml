name: Playwright Quality Gate

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-matrix:
    name: ${{ matrix.suite }} | ${{ matrix.browser }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [ui, api, integration]
        browser: [chromium, firefox]
        exclude:
          - suite: api
            browser: firefox
          - suite: api
            browser: chromium
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: matrix.suite != 'api'
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run API suite
        if: matrix.suite == 'api'
        run: npm run test:api

      - name: Run UI suite
        if: matrix.suite == 'ui'
        run: npx playwright test tests/ui --project=${{ matrix.browser }}

      - name: Run integration suite
        if: matrix.suite == 'integration'
        run: npx playwright test tests/integration --project=${{ matrix.browser }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.suite }}-${{ matrix.browser || 'api' }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn

      - name: Failure notification (GitHub summary)
        if: failure()
        run: |
          echo "## ❌ Playwright failure detected" >> $GITHUB_STEP_SUMMARY
          echo "Suite: ${{ matrix.suite }}" >> $GITHUB_STEP_SUMMARY
          echo "Browser: ${{ matrix.browser || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
          echo "Download uploaded artifacts from this run for screenshots/video/trace." >> $GITHUB_STEP_SUMMARY
